name: repro

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repro:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26, ubuntu-latest]
        script: [repro.py, repro_selectors.py, repro_selectors_deferred.py, repro_kqueue.py]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: reproduce
        run: python3 ${{ matrix.script }} 600

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - name: build + run (raw kqueue via libc, no Python)
        working-directory: rust
        run: cargo run --release -- 600

  c:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - name: build + run (pure C, raw kqueue, no libraries)
        run: |
          cc -O2 -o repro_c c/repro.c
          ./repro_c 600

  capture:
    # Capture lo0 during the C repro and dump the hung connection's packets --
    # is the RST on the wire or not? Runs on every macOS version (macOS 15 is
    # rarer, so it gets a longer budget; macOS 26 hangs within seconds).
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - name: on-the-wire evidence for a hung connection
        run: |
          set +e
          cc -O2 -o repro_c c/repro.c
          # -U writes each packet immediately; -s 128 keeps headers only; a ring
          # buffer (-C 40 MB, -W 3 files) caps disk use on a long run while still
          # retaining the last ~120 MB -- and the hung connection is last.
          sudo tcpdump -n -i lo0 -U -s 128 -C 40 -W 3 -w /tmp/lo0.pcap \
            'tcp[tcpflags] & (tcp-syn|tcp-rst|tcp-fin) != 0' >/tmp/td.log 2>&1 &
          TD=$!
          # Wait until tcpdump is actually listening before starting the repro.
          for _ in $(seq 1 40); do
            grep -q "listening on" /tmp/td.log 2>/dev/null && break; sleep 0.25
          done
          # Run until the first hang (exits then). macOS 15 needs more iterations.
          ./repro_c 1800 stop | tee /tmp/c.log
          # Stop tcpdump and let it flush + fully exit before reading the pcap.
          sudo pkill -INT tcpdump
          for _ in $(seq 1 40); do kill -0 "$TD" 2>/dev/null || break; sleep 0.25; done
          echo "=== macOS build ==="; sw_vers; uname -a
          echo "=== tcpdump stats (packets captured / dropped by kernel) ==="
          cat /tmp/td.log
          hung=$(grep -oE "UNDELIVERED: [0-9]+<->[0-9]+" /tmp/c.log | tail -1)
          echo "=== hung connection: $hung ==="
          # The hung connection is the LAST connection overall (the repro exits at
          # the first hang, and idles 2s afterward). Read the rotated capture files
          # oldest->newest and tail -- does a RST appear on the wire for it?
          echo "=== last 25 SYN/RST/FIN packets in the capture ==="
          for f in $(ls -tr /tmp/lo0.pcap* 2>/dev/null); do
            sudo tcpdump -n -tt -r "$f" 2>/dev/null
          done | tail -25
          # Diagnostic job: always green; the c/rust/python jobs are the gates.
          exit 0
      - name: sysdiagnose (Apple Feedback attachment; only when a hang was caught)
        run: |
          set +e
          if ! grep -q UNDELIVERED /tmp/c.log 2>/dev/null; then
            echo "no hang caught; skipping sysdiagnose"; exit 0
          fi
          mkdir -p /tmp/sysdiag
          sudo sysdiagnose -u -b -f /tmp/sysdiag
          sudo chmod -R a+r /tmp/sysdiag
          ls -lh /tmp/sysdiag
          exit 0
      - name: make capture readable for upload
        if: always()
        run: sudo chmod a+r /tmp/lo0.pcap* 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: capture-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            /tmp/lo0.pcap*
            /tmp/c.log
            /tmp/td.log
            /tmp/sysdiag/*
