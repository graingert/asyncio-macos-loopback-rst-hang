name: repro

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repro:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26, ubuntu-latest]
        script: [repro.py, repro_selectors.py, repro_selectors_deferred.py, repro_kqueue.py]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: reproduce
        run: python3 ${{ matrix.script }} 600

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - name: build + run (raw kqueue via libc, no Python)
        working-directory: rust
        run: cargo run --release -- 600

  c:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - name: build + run (pure C, raw kqueue, no libraries)
        run: |
          cc -O2 -o repro_c c/repro.c
          ./repro_c 600

  poll:
    # Portable poll(2) reproducer (c/repro_poll.c): one source file built on
    # each platform, no kqueue. Proves the bug lives in the kernel's RFC 5961
    # RST validation and is reachable through plain poll(2), not a kqueue
    # artifact.
    #
    # macos-26 reproduces -> the first-hang non-zero exit turns the job red
    # (same "red == bug demonstrated" convention as the other repro jobs).
    # ubuntu-latest is the CONTROL and must stay green: Linux anchors RST
    # validation on rcv_nxt, so it never leaves the connection half-open. If
    # ubuntu ever went red here, that would be a real, surprising regression.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 14
    steps:
      - uses: actions/checkout@v4
      - name: build + run (portable poll(2), no kqueue)
        run: |
          cc -O2 -o repro_poll c/repro_poll.c
          ./repro_poll 600 -j4

  freebsd:
    # FreeBSD is the original kqueue platform. c/repro.c is pure POSIX/BSD
    # sockets + kqueue, so it builds and runs unchanged. This distinguishes an
    # XNU/Darwin-specific bug from a broader BSD-family one. No native runner
    # exists, so run it in a FreeBSD VM on the Ubuntu host.
    #
    # This single job GATES (exits non-zero -> red on the first hang), CAPTURES
    # the hung connection's packets (absolute seq/ack), and traces the receiver's
    # TCP control block at the drop with DTrace -- the kernel-internal ground
    # truth the packet capture can only infer. It is deliberately one VM, not
    # several: concurrent vmactions bootstraps trip a 429 on the VM image.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: build + run + capture + dtrace (pure C, raw kqueue) on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
            set +e
            uname -a
            cc -O2 -o repro_c c/repro.c
            # DTrace the RFC 5961 RST-drop path: prints the receiver's rcv_nxt /
            # last_ack_sent / rcv_wnd vs the RST seq when a RST fails to reset an
            # ESTABLISHED connection. Best-effort: must not break the gate.
            dtrace -q -s dtrace/rst_drop.d >/tmp/dt.log 2>&1 &
            DT=$!
            # Give DTrace time to compile + instrument fbt::tcp_do_segment.
            i=0
            while [ $i -lt 60 ]; do
              grep -q "HANG-RST\|dtrace:" /tmp/dt.log 2>/dev/null && break
              sleep 0.5; i=$((i+1))
            done
            # Capture ALL tcp on lo0 so the peer's ACK (ack = last_ack_sent) and
            # the final data burst are recorded, not just the RST. Ring-buffered.
            tcpdump -n -i lo0 -U -s 128 -C 40 -W 3 -w /tmp/lo0.pcap 'tcp' \
              >/tmp/td.log 2>&1 &
            TD=$!
            i=0
            while [ $i -lt 40 ]; do
              grep -q "listening on" /tmp/td.log 2>/dev/null && break
              sleep 0.25; i=$((i+1))
            done
            # Run until the first hang, so it is the LAST connection and stays in
            # the ring buffer. FreeBSD hits a hang within seconds. repro_c returns
            # non-zero when a hang occurred -> keep that as the job's exit code.
            # NB: do not pipe repro_c into tee -- in sh, $? would then be tee's
            # (always 0) and the gate would go green on a hang. Capture directly.
            ./repro_c 900 stop > /tmp/c.log 2>&1
            rc=$?
            cat /tmp/c.log
            # Let DTrace flush the probe for the last hang, then stop everything.
            sleep 1
            pkill -INT tcpdump; kill -INT "$DT" 2>/dev/null
            i=0
            while [ $i -lt 40 ]; do kill -0 "$TD" 2>/dev/null || break; sleep 0.25; i=$((i+1)); done
            echo "=== DTrace: receiver TCB at each RST that failed to reset ==="
            cat /tmp/dt.log
            echo "=== tcpdump stats (captured / dropped) ==="; cat /tmp/td.log
            hung=$(grep -oE "UNDELIVERED: [0-9]+<->[0-9]+" /tmp/c.log | tail -1)
            echo "=== hung connection: $hung ==="
            # Isolate the hung port pair, print ABSOLUTE seq/ack (-S). Cross-check
            # the RST seq here against th_seq in the DTrace line above.
            pair=$(echo "$hung" | grep -oE "[0-9]+<->[0-9]+")
            if [ -n "$pair" ]; then
              p1=${pair%%<->*}; p2=${pair##*<->}
              echo "=== hung connection packets (absolute seq/ack), ports $p1 & $p2 ==="
              for f in $(ls -tr /tmp/lo0.pcap* 2>/dev/null); do
                tcpdump -n -tt -S -r "$f" "tcp and port $p1 and port $p2" 2>/dev/null
              done | tail -40
            fi
            # Preserve the gate: red build when a hang was observed.
            exit $rc

  poll-freebsd:
    # The same portable poll(2) reproducer on FreeBSD -- the third leg of the
    # macos-26 / freebsd / ubuntu comparison, from the one c/repro_poll.c source.
    # Goes red on the first hang, like the kqueue `freebsd` gate above.
    #
    # Serialized after `freebsd` (needs: + if: always()) rather than run
    # concurrently: two vmactions VM bootstraps in one workflow trip a 429 on
    # the image (see the `freebsd` job note). `if: always()` is required
    # because `freebsd` is designed to fail (red) when it reproduces, and a
    # plain `needs:` would otherwise skip this job.
    needs: freebsd
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: build + run (portable poll(2), no kqueue) on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
            uname -a
            cc -O2 -o repro_poll c/repro_poll.c
            ./repro_poll 600 -j4

  capture:
    # Capture lo0 during the C repro and dump the hung connection's packets --
    # is the RST on the wire or not? Runs on every macOS version (macOS 15 is
    # rarer, so it gets a longer budget; macOS 26 hangs within seconds).
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - name: on-the-wire evidence for a hung connection
        run: |
          set +e
          cc -O2 -o repro_c c/repro.c
          # -U writes each packet immediately; -s 128 keeps headers only; a ring
          # buffer (-C 40 MB, -W 3 files) caps disk use on a long run while still
          # retaining the last ~120 MB -- and the hung connection is last.
          # Capture ALL tcp (not just SYN/RST/FIN): to prove the seq mismatch we
          # need the peer's zero-window ACK (its ack field = last_ack_sent = the
          # window edge) and the 1-byte zero-window probe, not only the RST.
          sudo tcpdump -n -i lo0 -U -s 128 -C 40 -W 3 -w /tmp/lo0.pcap \
            'tcp' >/tmp/td.log 2>&1 &
          TD=$!
          # Wait until tcpdump is actually listening before starting the repro.
          for _ in $(seq 1 40); do
            grep -q "listening on" /tmp/td.log 2>/dev/null && break; sleep 0.25
          done
          # Run until the first hang (exits then). macOS 15 needs more iterations.
          ./repro_c 1800 stop | tee /tmp/c.log
          # Stop tcpdump and let it flush + fully exit before reading the pcap.
          sudo pkill -INT tcpdump
          for _ in $(seq 1 40); do kill -0 "$TD" 2>/dev/null || break; sleep 0.25; done
          echo "=== macOS build ==="; sw_vers; uname -a
          echo "=== tcpdump stats (packets captured / dropped by kernel) ==="
          cat /tmp/td.log
          hung=$(grep -oE "UNDELIVERED: [0-9]+<->[0-9]+" /tmp/c.log | tail -1)
          echo "=== hung connection: $hung ==="
          # The hung connection is the LAST connection overall (the repro exits at
          # the first hang, and idles 2s afterward). Read the rotated capture files
          # oldest->newest, isolate the hung port pair, and print ABSOLUTE seq/ack
          # (-S) so we can compare directly. Expected proof of the bug: the peer's
          # last ACK advertises win 0 with ack = W (the window edge); the RST then
          # carries seq = W+1 (one past the window), which the peer's RFC 5961
          # zero-window check (seq must == last_ack_sent exactly) silently drops.
          pair=$(echo "$hung" | grep -oE "[0-9]+<->[0-9]+")
          if [ -n "$pair" ]; then
            p1=${pair%%<->*}; p2=${pair##*<->}
            echo "=== hung connection packets (absolute seq/ack), ports $p1 & $p2 ==="
            for f in $(ls -tr /tmp/lo0.pcap* 2>/dev/null); do
              sudo tcpdump -n -tt -S -r "$f" "tcp and port $p1 and port $p2" 2>/dev/null
            done | tail -40
          else
            echo "=== no hang caught; last 25 packets (absolute seq/ack) ==="
            for f in $(ls -tr /tmp/lo0.pcap* 2>/dev/null); do
              sudo tcpdump -n -tt -S -r "$f" 2>/dev/null
            done | tail -25
          fi
          # Diagnostic job: always green; the c/rust/python jobs are the gates.
          exit 0
      - name: sysdiagnose (Apple Feedback attachment; only when a hang was caught)
        run: |
          set +e
          if ! grep -q UNDELIVERED /tmp/c.log 2>/dev/null; then
            echo "no hang caught; skipping sysdiagnose"; exit 0
          fi
          mkdir -p /tmp/sysdiag
          sudo sysdiagnose -u -b -f /tmp/sysdiag
          sudo chmod -R a+r /tmp/sysdiag
          ls -lh /tmp/sysdiag
          exit 0
      - name: make capture readable for upload
        if: always()
        run: sudo chmod a+r /tmp/lo0.pcap* 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: capture-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            /tmp/lo0.pcap*
            /tmp/c.log
            /tmp/td.log
            /tmp/sysdiag/*
